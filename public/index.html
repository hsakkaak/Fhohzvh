<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SHOUROV BOT • Neon Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono&display=swap');

body{
  font-family:'Orbitron',sans-serif;
  background:#030712;
  color:white;
  overflow-x:hidden;
}

.neon{
  box-shadow:0 0 20px currentColor;
}

.card{
  background:rgba(255,255,255,.04);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:22px;
  transition:.4s;
}
.card:hover{
  transform:translateY(-6px) scale(1.02);
}

.glow-blue{color:#00f2ff}
.glow-pink{color:#ff007a}
.glow-purple{color:#9d00ff}
.glow-green{color:#22c55e}
.glow-yellow{color:#facc15}

.typing::after{
  content:'|';
  animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:0}}

video{border-radius:18px;cursor:pointer}
</style>
</head>

<body class="p-6">

<!-- 🔊 Sounds -->
<audio id="hoverSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2691/2691-preview.mp3"></audio>

<div class="max-w-7xl mx-auto space-y-8">

<!-- 👤 PROFILE -->
<div class="card p-6 flex flex-col md:flex-row gap-6 items-center">
  <video id="coverVideo" width="260" muted loop>
    <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4">
  </video>

  <div class="flex-1">
    <h1 class="text-4xl font-bold glow-blue neon">SHOUROV BOT</h1>
    <p class="text-sm text-gray-400 mt-1 typing">Developer • Automation • AI Bot</p>

    <div class="flex gap-4 mt-4 text-2xl">
      <a href="https://www.facebook.com/shourov.sm24" target="_blank"><i class="fab fa-facebook glow-blue"></i></a>
      <a href="https://wa.me/8801709281334" target="_blank"><i class="fab fa-whatsapp glow-green"></i></a>
    </div>
  </div>

  <div class="text-right">
    <div class="text-xs text-gray-400">BD TIME</div>
    <div id="bdtime" class="text-xl glow-yellow neon"></div>
  </div>
</div>

<!-- 📊 STATS -->
<div class="grid grid-cols-2 md:grid-cols-5 gap-6">
  <div class="card p-5 text-center glow-blue neon">
    <div>Groups</div>
    <div id="groups" class="text-3xl">0</div>
  </div>
  <div class="card p-5 text-center glow-purple neon">
    <div>Users</div>
    <div id="users" class="text-3xl">0</div>
  </div>
  <div class="card p-5 text-center glow-green neon">
    <div>Commands</div>
    <div id="commands" class="text-3xl">0</div>
  </div>
  <div class="card p-5 text-center glow-pink neon col-span-2">
    <div>Admins</div>
    <div id="admins" class="text-xs break-words"></div>
  </div>
</div>

<!-- ⚙️ ACTION -->
<div class="grid md:grid-cols-4 gap-6">
  <a href="/appstate.html" class="card p-4 text-center glow-blue">🔑 Appstate</a>
  <a href="/logs.html" class="card p-4 text-center glow-purple">📜 Logs</a>
  <a href="/control.html" class="card p-4 text-center glow-green">⚙️ Control</a>
  <a href="/settings.html" class="card p-4 text-center glow-yellow">🛠 Settings</a>
</div>

</div>

<script>
const hoverSound=document.getElementById("hoverSound");
const clickSound=document.getElementById("clickSound");

document.querySelectorAll("a,.card").forEach(el=>{
  el.onmouseenter=()=>hoverSound.play();
  el.onclick=()=>clickSound.play();
});

const video=document.getElementById("coverVideo");
video.onclick=()=>{
  video.muted=false;
  video.play();
};

async function loadBotInfo(){
  const r=await fetch("/api/botinfo");
  const d=await r.json();
  groups.innerText=d.groups;
  users.innerText=d.users;
  commands.innerText=d.commands;
  admins.innerText=d.admins;
  bdtime.innerText=d.bdTime;
}

setInterval(loadBotInfo,1000);
loadBotInfo();
</script>

</body>
</html>

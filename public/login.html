<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SHOUROV BOT • Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  font-family:'Orbitron',sans-serif;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  background:#000;
}

/* 🔥 Animated Gradient */
.animated-bg{
  position:fixed;
  inset:0;
  z-index:-3;
  background:linear-gradient(120deg,#00ffff,#7f00ff,#ff0080,#00ff9d);
  background-size:400% 400%;
  animation:neonMove 20s ease infinite;
  filter:blur(60px);
  opacity:.35;
}

/* 🌌 Floating Particles */
#particles{
  position:fixed;
  inset:0;
  z-index:-2;
  overflow:hidden;
}
.particle{
  position:absolute;
  width:6px;
  height:6px;
  border-radius:50%;
  background:rgba(0,255,255,.9);
  box-shadow:0 0 14px currentColor;
  animation:float 12s linear infinite;
}

@keyframes float{
  from{transform:translateY(110vh);opacity:0}
  to{transform:translateY(-10vh);opacity:1}
}

@keyframes neonMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* Dark overlay */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.65);
  z-index:-1;
}

/* Login Card */
.card{
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.15);
  border-radius:22px;
  padding:40px 35px;
  width:320px;
  text-align:center;
  box-shadow:0 0 30px rgba(0,255,255,.3);
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
  background:#020617;
  color:white;
  font-size:15px;
  margin-top:10px;
}

button{
  margin-top:18px;
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(90deg,#00f2ff,#9d00ff);
  color:black;
  transition:.3s;
}
button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #00f2ff;
}
</style>
</head>

<body>

<div class="animated-bg"></div>
<div id="particles"></div>

<div class="card">
  <h2 style="margin-bottom:10px;">🔐 SHOUROV BOT Dashboard Login</h2>
  <p style="font-size:12px;color:#aaa">Only authorized access</p>

  <input id="pass" type="password" placeholder="Enter Password">
  <button onclick="login()">Login</button>
</div>

<script>
/* Login */
async function login(){
  const password=document.getElementById("pass").value;
  const res=await fetch("/api/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({password})
  });
  if(res.ok){
    location.href="/";
  }else{
    alert("❌ Wrong password");
  }
}

/* Floating particles */
const p=document.getElementById("particles");
for(let i=0;i<35;i++){
  const s=document.createElement("span");
  s.className="particle";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=8+Math.random()*12+"s";
  s.style.animationDelay=Math.random()*5+"s";
  s.style.color=["#00f2ff","#ff007a","#9d00ff","#22c55e"][Math.floor(Math.random()*4)];
  p.appendChild(s);
}
</script>

</body>
</html>
